<!doctype html>
<html lang="pt-BR" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Tellarheaven | Anime & Fantasy Illustrator</title>
    <meta
      name="description"
      content="Tellarheaven is a digital illustrator specializing in anime, dragons, fantasy art, and TCG card illustration. Explore original artwork and visual stories."
    />
    <meta name="author" content="Tellarheaven" />
    <meta
      name="keywords"
      content="anime art, fantasy illustration, dragon art, TCG illustration, trading card game art, digital illustrator, anime character art, fantasy digital art, card game artist"
    />
    <link rel="canonical" href="https://tellarheaven.com.br" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (Facebook, WhatsApp, Discord, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tellarheaven.com.br" />
    <meta
      property="og:title"
      content="Tellarheaven | Anime & Fantasy Digital Illustrator"
    />
    <meta
      property="og:description"
      content="Anime, dragons, fantasy, and TCG card art by Tellarheaven. Explore original digital illustrations and visual stories."
    />
    <meta
      property="og:image"
      content="https://tellarheaven.com.br/og-image.jpg"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:site_name" content="Tellarheaven" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://tellarheaven.com.br" />
    <meta
      name="twitter:title"
      content="Tellarheaven | Anime & Fantasy Digital Illustrator"
    />
    <meta
      name="twitter:description"
      content="Anime, dragons, fantasy, and TCG card art by Tellarheaven. Explore original digital illustrations and visual stories."
    />
    <meta
      name="twitter:image"
      content="https://tellarheaven.com.br/og-image.jpg"
    />
